<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicios FOR</title>
  </head>
  <body>
    <h1>Exercicios For</h1>
    <script>

        let corpo = window.document.body;

        corpo.style.background = "#331515";
        corpo.style.color = "#fff";
        corpo.style.textAlign = "center";
        corpo.style.fontSize = "22px";
        corpo.style.fontFamily = "Verdana";

        function tabuada() {
  let n = Number(prompt("Digite até qual tabuada deseja:"));

  for (let j = 1; j <= n; j++) {
    document.writeln(`<br>Tabuada do ${j}<br>`);

    for (let i = 1; i <= 10; i++) {
      document.writeln(`${j} x ${i} = ${j * i} <br>`);
    }
  }
}

tabuada();

    </script>
  </body>
</html>
