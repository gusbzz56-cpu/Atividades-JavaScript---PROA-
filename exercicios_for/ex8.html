<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicios FOR</title>
  </head>
  <body>
    <h1>Exercicios For</h1>
    <script>

        let corpo = window.document.body;

        corpo.style.background = "#331515";
        corpo.style.color = "#fff";
        corpo.style.textAlign = "center";
        corpo.style.fontSize = "22px";
        corpo.style.fontFamily = "Verdana";

        function valorUsuario() {
  let numero = Number(prompt("Digite um número maior que zero:"));

  while (numero <= 0) {
    numero = Number(prompt("Valor inválido. Digite novamente:"));
  }

  for (let i = 1; i <= numero; i++) {
    document.writeln(`${i} <br>`);
  }
}

valorUsuario();

    </script>
  </body>
</html>
