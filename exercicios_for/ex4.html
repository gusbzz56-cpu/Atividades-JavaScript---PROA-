<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicios FOR</title>
  </head>
  <body>
    <h1>Exercicios For</h1>
    <script>

        let corpo = window.document.body;

        corpo.style.background = "#331515";
        corpo.style.color = "#fff";
        corpo.style.textAlign = "center";
        corpo.style.fontSize = "22px";
        corpo.style.fontFamily = "Verdana";

        function inteiros15() {
  let soma = 0;
  let quantidade = 0;

  for (let i = 15; i <= 100; i++) {
    soma += i;
    quantidade++;
  }

  let media = soma / quantidade;

  document.writeln(`Soma: ${soma} <br>`);
  document.writeln(`Média: ${media}`);
}

inteiros15();

    </script>
  </body>
</html>
