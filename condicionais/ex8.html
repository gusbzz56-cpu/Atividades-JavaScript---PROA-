  <body>
    <h1>Exercicios</h1>

    <script>
let corpo=document.body;
corpo.style.background="#331515";corpo.style.color="#fff";

function ipi(){
let ipi=Number(prompt());
let v1=Number(prompt()),q1=Number(prompt());
let v2=Number(prompt()),q2=Number(prompt());
let t=(v1*q1+v2*q2)*(ipi/100+1);
document.writeln(t.toFixed(2));
}
ipi();
</script>
