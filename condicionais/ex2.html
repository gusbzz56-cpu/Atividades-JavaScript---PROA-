<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicios</title>
  </head>
  <body>
    <h1>Exercicios</h1>

    <script>

let corpo=document.body;
corpo.style.background="#331515";corpo.style.color="#fff";

function divisivel(){
let n=Number(prompt("Número:"));
if(n%10==0)document.writeln("Divisível por 10");
else if(n%5==0)document.writeln("Divisível por 5");
else if(n%2==0)document.writeln("Divisível por 2");
else document.writeln("Não divisível");
}
divisivel();
</script>

    </script>
  </body>
</html>
