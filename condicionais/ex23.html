<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicios</title>
  </head>
  <body>
    <h1>Exercicios</h1>

    <script>
let corpo=document.body;
corpo.style.background="#331515";corpo.style.color="#fff";

function faixas(){
let a=0,b=0,c=0;
for(let i=0;i<20;i++){
let n=Number(prompt());
if(n<=100)a++;
else if(n<=200)b++;
else c++;
}
document.writeln(a+" "+b+" "+c);
}
faixas();
</script>
  </body>
</html>
