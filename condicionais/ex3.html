<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicios</title>
  </head>
  <body>
    <h1>Exercicios</h1>

    <script>
let corpo=document.body;
corpo.style.background="#331515";corpo.style.color="#fff";

function saldoMedio(){
let s=Number(prompt("Saldo:"));
if(s<=500)document.writeln("Sem crédito");
else if(s<=1000)document.writeln((s*0.3).toFixed(2));
else if(s<=3000)document.writeln((s*0.4).toFixed(2));
else document.writeln((s*0.5).toFixed(2));
}
saldoMedio();
</script>
  </body>
</html>
